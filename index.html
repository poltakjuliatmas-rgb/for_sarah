<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Untuk Sarah 😁</title>

<style>
    #touchControls{display:none}

@media(max-width:700px){
  #touchControls{
    display:flex;
    gap:10px;
    margin-top:15px;
  }

  #touchControls button{
    width:80px;
    height:60px;
    font-size:28px;
    margin-top:0;
  }
}
.birthday-photo{
    width:min(230px,65vw);
    border-radius:20px;
    margin:20px auto;
    display:block;
    opacity:0;
    transform:scale(.9);
    transition:1s;
}
.birthday-photo.show{
    opacity:1;
    transform:scale(1);
}
.birthday-photo:hover{
    transform:scale(1.03);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{
    min-height:100dvh;
    overflow-x:hidden;
    overflow-y:auto;
    color:#fff;
    background:linear-gradient(135deg,#1e3a8a,#9333ea);
}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 20% 20%,rgba(255,255,255,.15),transparent 30%),radial-gradient(circle at 80% 30%,rgba(255,255,255,.12),transparent 30%),radial-gradient(circle at 50% 80%,rgba(255,255,255,.1),transparent 30%);animation:bgMove 8s ease-in-out infinite alternate;pointer-events:none}

@keyframes bgMove{from{transform:translateY(-20px)}to{transform:translateY(20px)}}
@keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
@keyframes bounce{50%{transform:scale(1.15)}}
@keyframes floatUp{from{opacity:1;transform:translateY(0) rotate(0)}to{opacity:0;transform:translateY(-110vh) rotate(360deg)}}
@keyframes sparkle{0%{opacity:0;transform:scale(.2)}50%{opacity:1}100%{opacity:0;transform:scale(2)}}

.game-container{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    width:100%;
    height:100%;
}
.page{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    overflow-y:auto;
    text-align:center;
    opacity:0;
    visibility:hidden;
    transition:.6s;
}
.active{opacity:1;visibility:visible}
.login-box{
    width:min(420px,100%);
}
.login-box label{
    display: block;
    text-align: left;
    margin: 30px 0 6px;
    font-weight: bold;
}

.login-box input{
    display: block;
    width: 100%;
    box-sizing: border-box;
    margin-bottom: 6px;
}

input{width:100%;padding:14px;margin:10px 0;border:none;border-radius:12px;outline:none;transition:.3s}
input:focus{transform:scale(1.02)}

button{
    width:min(300px,100%);
    margin-top:30px;
    padding:15px 30px;
    border:none;
    border-radius:12px;
    background:#ff4d4d;
    color:#fff;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

canvas{background:rgba(255,255,255,.15);border-radius:20px;margin-top:15px}
.progress{width:320px;max-width:90%;height:18px;background:rgba(255,255,255,.2);border-radius:50px;overflow:hidden;margin-top:10px}
#progressBar{width:0;height:100%;border-radius:50px;background:#f472b6;transition:.3s}
#giftBox{display:none;margin-top:20px;font-size:120px;cursor:pointer;animation:bounce 1s infinite}

h1{
    font-size:clamp(28px,5vw,42px);
}

h2{
    font-size:clamp(22px,4vw,30px);
}

p{
    font-size:clamp(16px,2vw,20px);
}
.card{
    width:min(900px,95%);
    background:#fff;
    color:#333;
    padding:clamp(20px,4vw,40px);
    border-radius:25px;
    box-shadow:0 0 30px rgba(0,0,0,.3);
    animation:popIn .8s ease;
}
.card{
    max-width:900px;
    width:min(900px,95%);
    margin:auto;
}
.card h1{color:#e11d48}

.floating{position:fixed;font-size:28px;bottom:-60px;pointer-events:none;animation:floatUp 6s linear forwards}
.sparkle{position:fixed;font-size:30px;animation:sparkle 1.5s ease-out forwards}
/* Page 3 only */
#page3{
    justify-content:center;
    align-items:flex-start;
    padding:25px 15px;
    overflow-y:auto;
}

#page3 .card{
    width:min(900px,95%);
    margin:0 auto;
}

@media (max-width:700px){

    #page3{
        padding:20px 12px 40px;
    }

    #page3 .card{
        width:100%;
        padding:20px;
    }

    #page3 .birthday-photo{
        width:200px;
        max-width:65vw;
    }
}
    
</style>
</head>
<body>

<div id="page1" class="page active">
  <div class="login-box">
    <h1>Hello there!!! Please verify yourself 😁</h1>

    <label for="username">Nickname</label>
    <input id="username" type="text" placeholder="Enter your nickname">

    <label for="password">Your Birthday</label>
    <input
      id="password"
      type="text"
      placeholder="Select your birthday"
      onfocus="this.type='date'"
      onblur="if(!this.value)this.type='text'">

    <button onclick="verify()">Verify</button>

    <p id="error" style="margin-top:15px; color:#ff4d4d; font-size:25px; font-weight:bold;"></p>
  </div>
</div>
    
<div id="pageWelcome" class="page">
  <div class="card">
    <h1 id="welcomeTitle">Hello!</h1>
    <p style="margin-top:20px;line-height:1.8">
      I see today is your special day 😁<br><br>
      Aku ada hadiah untuk mu tapi kau harus selesaikan dulu game ini.<br><br>
      Catch 10 cakes 🎂 to unlock the gift 🎁
    </p>
    <button style="margin-top:25px" onclick="startGame(this)">Start The Challenge 🎮</button>
  </div>
</div>

<div id="page2" class="page">
    <div class="game-container">
        <h1>🎮 Catch 10 Cakes</h1>
        <h2 id="score">Score: 0</h2>

        <div class="progress">
            <div id="progressBar"></div>
        </div>

        <canvas id="game"></canvas>

        <div id="giftBox">🎁</div>
    </div>
</div>

<div id="page3" class="page">
  <div class="card">

    <h1>🎉 HAPPY BIRTHDAY 🎉</h1>

<img src="Sarah.png" class="birthday-photo" id="birthdayPhoto" alt="Sarah">

<p id="birthdayMessage"
   style="margin-top:20px;line-height:1.8">
</p>

<button id="waButton" style="display:none;margin-top:25px;">
    Tekan jika kamu suka 😁
</button>

  </div>
</div>



<script>
function typeWriter(text, element, speed = 35) {

    element.innerHTML = "";
    let i = 0;

    function typing() {

        if (i >= text.length) {

            const btn = document.getElementById("waButton");

            btn.style.display = "inline-block";

            btn.animate(
                [
                    { opacity: 0, transform: "translateY(20px)" },
                    { opacity: 1, transform: "translateY(0)" }
                ],
                {
                    duration: 600,
                    fill: "forwards"
                }
            );

            return;
        }

        const char = text.charAt(i);

        if (char === "\n") {
            element.innerHTML += "<br>";
        } else {
            element.innerHTML += char;
        }

        i++;

        let delay = speed;

        if (".,!?".includes(char)) {
            delay = 250;
        }

        setTimeout(typing, delay);
    }

    typing();
}     

const birthdayText =
`Selamat ulang tahun ya...

Panjang umur, sehat selalu, semoga diberi rezeki yang melimpah.
Semoga semua yang kamu impikan satu per satu bisa tercapai.
Aminn.

Hadiah sudah terkirim.
Semoga kamu senang ya hahaha 😁🎂`;

const photo = document.getElementById("birthdayPhoto");
const message = document.getElementById("birthdayMessage");
const btn = document.getElementById("waButton");

photo.classList.remove("show");
message.innerHTML = "";
btn.style.display = "none";

const CORRECT_NAME='Sarah';
const CORRECT_BIRTHDAY='1998-07-14';

const $=id=>document.getElementById(id);

const canvas=$('game'),ctx=canvas.getContext('2d');

let cakes=[],score=0,gamePaused=false,gameStarted=false;

const player={
 x:260,
 y:340,
 speed:8
};

const keys={};

// ===============================
// TOUCH & MOUSE CONTROL
// ===============================

let targetX=player.x;
let dragging=false;

function getPointerX(e){
 const rect=canvas.getBoundingClientRect();

 if(e.touches && e.touches.length){
  return e.touches[0].clientX-rect.left;
 }

 return e.clientX-rect.left;
}

function updatePlayerPosition(x){
 targetX=x-30;

 if(targetX<0) targetX=0;

 if(targetX>canvas.width-60)
  targetX=canvas.width-60;
}

canvas.addEventListener('touchstart',e=>{
 dragging=true;
 updatePlayerPosition(getPointerX(e));
},{passive:false});

canvas.addEventListener('touchmove',e=>{
 if(!dragging) return;

 e.preventDefault();
 updatePlayerPosition(getPointerX(e));
},{passive:false});

canvas.addEventListener('touchend',()=>{
 dragging=false;
});

canvas.addEventListener('mousedown',e=>{
 dragging=true;
 updatePlayerPosition(getPointerX(e));
});

canvas.addEventListener('mousemove',e=>{
 if(!dragging) return;
 updatePlayerPosition(getPointerX(e));
});

window.addEventListener('mouseup',()=>{
 dragging=false;
});

canvas.addEventListener('pointerdown',e=>{
 dragging=true;
 updatePlayerPosition(getPointerX(e));
});

canvas.addEventListener('pointermove',e=>{
 if(!dragging) return;
 updatePlayerPosition(getPointerX(e));
});

window.addEventListener('pointerup',()=>{
 dragging=false;
});

function showPage(id){
 document.querySelectorAll('.page').forEach(
  p=>p.classList.remove('active')
 );

 $(id).classList.add('active');
}

function verify(){
 const user=$('username').value.trim();
 const birthday=$('password').value;

 if(
  user.toLowerCase()===CORRECT_NAME.toLowerCase() &&
  birthday===CORRECT_BIRTHDAY
 ){
  $('welcomeTitle').innerHTML=` Hello ${user}!😉 `;
  showPage('pageWelcome');
 }else{
  $('error').innerText='Oppss!!!..this one is not for you 😒';
 }
}

function resizeCanvas(){
 [canvas.width,canvas.height]=
 window.innerWidth<700
 ?[350,300]
 :[600,400];
}

resizeCanvas();

window.addEventListener('resize',resizeCanvas);

['keydown','keyup'].forEach(type=>
 document.addEventListener(type,e=>
  keys[e.key]=type==='keydown'
 )
);

function startGame(btn){

 gameStarted=false;

 let count=3;

 btn.disabled=true;
 btn.innerHTML=count;

 const timer=setInterval(()=>{

  if(--count>0){
   btn.innerHTML=count;
  }else{

   clearInterval(timer);

   btn.innerHTML='GO! 🚀';

   setTimeout(()=>{

    gameStarted=true;
    cakes=[];
    score=0;
    gamePaused=false;

    $('score').innerText='Score: 0';
    $('progressBar').style.width='0%';
    $('giftBox').style.display='none';

    player.x=canvas.width/2-30;
    targetX=player.x;

    player.y=canvas.height-40;

    showPage('page2');

   },500);

  }

 },1000);

}

setInterval(()=>{

 if(gameStarted && !gamePaused){

  cakes.push({
   x:Math.random()*(canvas.width-50),
   y:-30
  });

 }

},1000);

function drawPlayer(){
 ctx.font='55px serif';
 ctx.fillText('🧺',player.x,player.y);
}

function drawCakes(){
 ctx.font='38px serif';

 cakes.forEach(c=>
  ctx.fillText('🎂',c.x,c.y)
 );
}

function createSparkles(){

 for(let i=0;i<20;i++){

  const s=document.createElement('div');

  s.className='sparkle';
  s.innerHTML='✨';

  s.style.left=Math.random()*100+'vw';
  s.style.top=Math.random()*100+'vh';

  document.body.appendChild(s);

  setTimeout(()=>s.remove(),1500);

 }

}

function update(){

 if(!gameStarted || gamePaused){

  requestAnimationFrame(update);
  return;

 }

 ctx.clearRect(0,0,canvas.width,canvas.height);

 // Keyboard control

 if(keys.ArrowLeft)
  targetX-=player.speed;

 if(keys.ArrowRight)
  targetX+=player.speed;

 targetX=Math.max(
  0,
  Math.min(targetX,canvas.width-60)
 );

 // Smooth movement

 player.x+=(targetX-player.x)*0.25;

 cakes.forEach((cake,i)=>{

  cake.y+=2;

  if(
   cake.y>player.y-40 &&
   cake.x>player.x-20 &&
   cake.x<player.x+60
  ){

   cakes.splice(i,1);

   score++;

   $('score').innerText=`Score: ${score}`;
   $('progressBar').style.width=`${score*10}%`;

   if(score>=10){

    gamePaused=true;

    createSparkles();

    setTimeout(()=>{
     $('giftBox').style.display='block';
    },700);

   }

  }

  if(cake.y>canvas.height){
   cakes.splice(i,1);
  }

 });

 drawPlayer();
 drawCakes();

 requestAnimationFrame(update);

}

update();

function createPartyItem(){

 const items=[
  '🎈',
  '🎂',
  '🎉',
  '🎊',
  '🎁',
  '🍰',
  '🧁'
 ];

 const item=document.createElement('div');

 item.className='floating';

 item.innerHTML=
  items[Math.floor(Math.random()*items.length)];

 item.style.left=Math.random()*100+'vw';
 item.style.fontSize=(24+Math.random()*20)+'px';

 document.body.appendChild(item);

 setTimeout(()=>{
  item.remove();
 },6000);

}

$('giftBox').addEventListener('click',()=>{

 $('giftBox').innerHTML='🎉';

 for(let i=0;i<100;i++){
  setTimeout(createPartyItem,i*20);
 }

 setTimeout(()=>{

  const photo = document.getElementById("birthdayPhoto");
const message = document.getElementById("birthdayMessage");

// Reset animation
photo.classList.remove("show");
message.innerHTML = "";

showPage("page3");

// Small delay so the page transition finishes first
setTimeout(() => {

    photo.classList.add("show");

    setTimeout(() => {
        typeWriter(birthdayText, message, 40);
    }, 800);

}, 300);

  setInterval(()=>{

   if($('page3').classList.contains('active')){
    createPartyItem();
   }

  },500);

 },1500);

});
document.getElementById("waButton").addEventListener("click", () => {

    const phone = "6285232434050"; // Your number

    const text =
`Kasi tau dong seberapa senang kamu 😁 ?? 1-5 ⭐??`;

    window.open(
        `https://wa.me/${phone}?text=${encodeURIComponent(text)}`,
        "_blank"
    );

});
</script>
